name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Content guard (all files)
        run: bash scripts/check-content-guard.sh --mode=all

      - name: Markdown allowlist guard
        run: bash scripts/check-public-md-allowlist.sh

      - name: Rules catalog sanity
        run: bash scripts/check-applicable-rules.sh --mode=all --no-ack

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (changed files only)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          CHANGED=$(git diff --name-only --diff-filter=d "$BASE_SHA" HEAD -- '*.ts' '*.tsx' || true)
          if [ -n "$CHANGED" ]; then
            echo "Linting changed files:"
            echo "$CHANGED"
            npx eslint $CHANGED
          else
            echo "No TS/TSX files changed, skipping lint."
          fi

      - name: Test
        run: npm test
